<div class="page-header">
  <h1 class="page-title">Users</h1>
  <p class="page-subtitle">All users in the system.</p>
</div>

<button mat-raised-button class="add-button" routerLink="/users/new">
  <mat-icon>add</mat-icon>
  Add user
</button>

<mat-card class="users-card">
  <mat-card-content>
    @if (isLoading) {
      <div class="loading-container">
        <mat-spinner diameter="40"></mat-spinner>
      </div>
    } @else {
      <table mat-table [dataSource]="users" matSort class="users-table">

        <ng-container matColumnDef="displayName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
          <td mat-cell *matCellDef="let user">{{ user.displayName }}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
          <td mat-cell *matCellDef="let user">{{ user.email }}</td>
        </ng-container>

        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Role</th>
          <td mat-cell *matCellDef="let user">
            <span class="role-badge">{{ user.role.name }}</span>
          </td>
        </ng-container>

<ng-container matColumnDef="actions">
  <th mat-header-cell *matHeaderCellDef>Action</th>
  <td mat-cell *matCellDef="let user">
    <button mat-icon-button class="icon-edit" matTooltip="Edit" [routerLink]="['/users/edit', user.id]">
      <mat-icon>edit</mat-icon>
    </button>
    <button mat-icon-button class="icon-delete" matTooltip="Delete"(click)="deleteUser(user.id, user.displayName)">
      <mat-icon>delete</mat-icon>
    </button>
  </td>
</ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator
        [length]="totalElements"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [pageSizeOptions]="[10, 20, 50]"
        (page)="onPageChange($event)"
      >
      </mat-paginator>
    }
  </mat-card-content>
</mat-card>
